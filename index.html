<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>brxpower</title>
  <style>
    :root { color-scheme: light dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b3d2e;
      color: #eafff4;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: clamp(2.5rem, 8vw, 5rem); letter-spacing: -0.03em; }
    p { margin-top: 1rem; opacity: 0.8; font-size: 1.1rem; }
    .dot { color: #4ade80; }
  </style>
</head>
<body>
  <main>
    <h1>brx<span class="dot">power</span></h1>
    <p>Clean energy, rooted in Brazil.</p>
  </main>
</body>
</html>
